title: "[Idea] "
labels: ["idea"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like to see added or changed? This is for early-stage/open-ended ideas — if it's a concrete, ready-to-track request, consider opening a feature request issue instead.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why would this help?
      description: What problem does it solve, or what does it make better?
    validations:
      required: false
